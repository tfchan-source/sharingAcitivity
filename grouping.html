<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division - Grouping</title>
    <link rel="stylesheet" href="./style.css"> <!-- Fixed CSS path -->
</head>
<body>
    <div class="container">
        <!-- Fixed Back Link -->
        <a href="./index.html" class="back-button"> ← </a>
        
        <h1>Grouping: Make Fixed-Size Groups</h1>
     
        <!-- Controls -->
        <div class="controls">
            <label for="item-count-grouping"> Number of basketballs:</label>
            <input type="number" id="item-count-grouping" min="1" max="50" value="20">
            
            <label for="items-per-group">In groups of:</label>
            <input type="number" id="items-per-group" min="1" max="10" value="3">
            
            <button id="reset-grouping"> ↻ </button>
        </div>
        
        <!-- Items Container (with visual groups) -->
        <div id="grouping-container">
            <div id="grouping-items" class="item-container"></div>
            
            <!-- Visual Group Wrappers (for colored circles/borders) -->
            <div id="visual-groups" class="visual-groups-container"></div>
        </div>
        
        <!-- Result -->
        <!-- <div id="grouping-result" class="result"></div> -->
    </div>

    <script src="./app.js"></script> <!-- Fixed JS path -->
</body>
</html>
